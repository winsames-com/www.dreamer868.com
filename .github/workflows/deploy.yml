name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SITE_URL: https://www.dreamer868.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Pages CDN propagation
        run: sleep 15

      - name: Fetch sitemap and verify all URLs
        run: |
          echo "Fetching sitemap index..."
          SITEMAPS=$(curl -sf "$SITE_URL/sitemap-index.xml" \
            | grep -oP '(?<=<loc>)[^<]+')

          URLS=""
          for sm in $SITEMAPS; do
            echo "Fetching $sm ..."
            URLS="$URLS $(curl -sf "$sm" | grep -oP '(?<=<loc>)[^<]+')"
          done

          TOTAL=0
          FAILED=0
          FAIL_LIST=""

          for u in $URLS; do
            TOTAL=$((TOTAL + 1))
            CODE=$(curl -sf -o /dev/null -w '%{http_code}' "$u")
            if [ "$CODE" != "200" ]; then
              FAILED=$((FAILED + 1))
              FAIL_LIST="$FAIL_LIST\n  ✗ $CODE $u"
            fi
          done

          echo ""
          echo "===== Verification Result ====="
          echo "Total URLs: $TOTAL"
          echo "Failed: $FAILED"

          if [ "$FAILED" -gt 0 ]; then
            echo -e "\nFailed URLs:$FAIL_LIST"
            exit 1
          else
            echo "All URLs returned 200 ✓"
          fi

  indexnow:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Submit changed URLs to IndexNow
        # 金鑰本就公開託管於 /<key>.txt，非機密，可直接寫在此
        env:
          INDEXNOW_KEY: c5a3697eb65d33f5f4c44efd86d879fb
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="${AFTER}~1"
          fi
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- 'src/content/articles/*.md' 'src/pages/' || true)
          echo "Changed content files:"; echo "$CHANGED"
          if [ -z "$CHANGED" ]; then
            echo "No content/page changes; skipping IndexNow."
            exit 0
          fi
          node scripts/indexnow-submit.mjs $CHANGED
