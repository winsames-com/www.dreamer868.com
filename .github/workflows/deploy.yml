name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SITE_URL: https://www.dreamer868.com

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Pages CDN propagation
        run: sleep 15

      - name: Fetch sitemap and verify all URLs
        run: |
          echo "Fetching sitemap index..."
          SITEMAPS=$(curl -sf "$SITE_URL/sitemap-index.xml" \
            | grep -oP '(?<=<loc>)[^<]+')

          URLS=""
          for sm in $SITEMAPS; do
            echo "Fetching $sm ..."
            URLS="$URLS $(curl -sf "$sm" | grep -oP '(?<=<loc>)[^<]+')"
          done

          TOTAL=0
          FAILED=0
          FAIL_LIST=""

          for u in $URLS; do
            TOTAL=$((TOTAL + 1))
            CODE=$(curl -sf -o /dev/null -w '%{http_code}' "$u")
            if [ "$CODE" != "200" ]; then
              FAILED=$((FAILED + 1))
              FAIL_LIST="$FAIL_LIST\n  ✗ $CODE $u"
            fi
          done

          echo ""
          echo "===== Verification Result ====="
          echo "Total URLs: $TOTAL"
          echo "Failed: $FAILED"

          if [ "$FAILED" -gt 0 ]; then
            echo -e "\nFailed URLs:$FAIL_LIST"
            exit 1
          else
            echo "All URLs returned 200 ✓"
          fi
